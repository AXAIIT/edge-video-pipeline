pipeline_config_id: rdk_x5_bpu_single_thread_v1
target: rdk_x5_8gb
backend_runtime: bpu
pipeline_mode: single_thread
status: ready_for_board_run
purpose: minimal_cpp_bpu_smoke

input:
  stream_config: projects/03_video_pipeline/configs/streams/video_fixed_v1.yaml
  default_input_source_id: video_set_runtime_v1
  pace_video_file: true

model:
  model_config: projects/03_video_pipeline/configs/models/yolo11n.yaml
  board_config: projects/03_video_pipeline/configs/boards/rdk_x5_8gb.yaml
  backend_artifact_path: models/yolo11n/rdk_x5_bpu_split_head/yolo11n_640_rdkx5_split_head_int8_ptq_calib500.bin
  backend_artifact_sha256: 2a90fb0783742b8f663458dd9a043b34ff046a98753ec7ee87275b8faa6b411c
  precision_or_quantization: int8_ptq

threads:
  mode: single_thread
  stages:
    - capture_decode
    - preprocess
    - inference
    - postprocess
    - output

queues:
  mainline_policy: none
  queue_capacity: 0

buffers:
  reuse: false
  pool_size: 0
  bpu_input_buffer_reuse: false
  bpu_output_buffer_reuse: false

output:
  display: false
  save_video: false
  save_json: true
  render_boxes: true
  output_sample_dir: projects/03_video_pipeline/runs/<run_id>/outputs

logging:
  raw_schema: benchmark/schemas/video_pipeline_raw_schema.yaml
  raw_result_path: benchmark/raw/03_video_pipeline/rdk_x5_8gb/<run_id>.jsonl
  runtime_log_path: logs/runtime/03_video_pipeline/rdk_x5_8gb/<run_id>.log
  monitor_log_path: logs/monitor/03_video_pipeline/rdk_x5_8gb/<run_id>_bpu.log
  failure_log_path: logs/failures/03_video_pipeline/rdk_x5_8gb/<run_id>.jsonl
  per_frame_trace: true
  runtime_evidence_required: true
  accelerator_evidence_required: true

benchmark:
  warmup_frames: 10
  smoke_duration_sec: 60
  batch: 1
  concurrency: 1

quality_alignment:
  fixed_input_alignment_status: pending
  task_level_quality_status: pending

compatibility:
  current_app_consumes:
    pipeline_mode: single_thread
    queue_policy: none
    buffer_reuse: false
  note: 该配置用于首次上板最小链路验证，目标是尽快确认 hbDNN 初始化、NV12 输入和 split-head 输出解码，而不是正式性能结论。
