pipeline_config_id: rdk_x5_bpu_fixed_input_alignment_v1
target: rdk_x5_8gb
backend_runtime: bpu
pipeline_mode: backend_pipeline
status: ready_for_board_run
purpose: fixed_input_alignment_no_drop

input:
  stream_config: projects/03_video_pipeline/configs/streams/video_fixed_v1.yaml
  default_input_source_id: video_short_001
  pace_video_file: true

model:
  model_config: projects/03_video_pipeline/configs/models/yolo11n.yaml
  board_config: projects/03_video_pipeline/configs/boards/rdk_x5_8gb.yaml
  backend_artifact_path: models/yolo11n/rdk_x5_bpu_split_head/yolo11n_640_rdkx5_split_head_int8_ptq_calib500.bin
  backend_artifact_sha256: 2a90fb0783742b8f663458dd9a043b34ff046a98753ec7ee87275b8faa6b411c
  precision_or_quantization: int8_ptq

threads:
  mode: multithread
  capture_threads: 1
  preprocess_threads: 1
  inference_threads: 1
  postprocess_threads: 1
  output_threads: 1

queues:
  mainline_policy: block
  queue_capacity: 32
  queue_push_timeout_ms: 20
  quality_policy: no_drop
  note: Fixed-input alignment must preserve manifest frame_id continuity; realtime drop policies are invalid for this flow.

buffers:
  reuse: true
  pool_size: 32
  bpu_input_buffer_reuse: true
  bpu_output_buffer_reuse: true

output:
  display: false
  save_video: false
  save_json: true
  render_boxes: false

benchmark:
  duration_sec: 0
  loop_video_file: false
  batch: 1
  concurrency: 1

quality_alignment:
  scope: fixed_input_manifest
  fixed_input_alignment_status: pending
  task_level_quality_status: not_applicable_fixed_input_only
  frame_alignment: current raw must contain manifest frame_id values without gaps and with per-frame detections payload.
  pass_requires:
    - drop_frame_count_max == 0
    - frame_id_gaps == 0
    - schema_check_pass
    - trace_check_pass
